<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Pro Max</title>

<style>
body{font-family:sans-serif;background:#58cc02;margin:0;}
header{color:white;text-align:center;padding:15px;position:relative;}
#stats{position:absolute;right:10px;top:10px;font-size:14px;}

.card{background:white;margin:15px;padding:15px;border-radius:15px;}
button{width:100%;padding:10px;margin-top:10px;background:#58cc02;color:white;border:none;border-radius:10px;}
input{width:100%;padding:10px;margin-top:5px;}
</style>
</head>

<body>

<header>
<h2>🇫🇷 French Pro Max</h2>
<div id="stats">
<span id="xp">XP:0</span> |
<span id="level">Lv:1</span> |
<span id="coins">🪙0</span> |
<span id="money">$0</span>
</div>
</header>

<div class="card">
<h3>Login</h3>
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
<p id="welcome"></p>
</div>

<div class="card">
<h3>📚 Lesson</h3>
<div id="lessonBox"></div>
</div>

<div class="card">
<h3>🎯 Daily Missions</h3>
<p id="mission1"></p>
<p id="mission2"></p>
<p id="mission3"></p>
</div>

<div class="card">
<h3>🛒 Shop</h3>
<button onclick="buy('XP Boost')">XP Boost (20 coins)</button>
</div>

<div class="card">
<h3>🎤 Voice</h3>
<button onclick="startVoice()">Talk</button>
</div>

<div class="card">
<h3>💰 Earnings</h3>
<button onclick="convertCoins()">Convert 100 coins → $1</button>
</div>

<script src="app.js"></script>
</body>
</html>
